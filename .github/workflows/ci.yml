name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Parser unit tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check all JS sources
        run: |
          for f in parser.js background.js content.js main_world.js; do
            echo "↪ checking $f"
            node --check "$f"
          done

      - name: Run parser unit tests
        run: node tests/test_parser.js

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3');
            if (!m.name || !m.version || !m.description) throw new Error('missing required fields');
            if (!m.background?.service_worker) throw new Error('missing service_worker');
            if (!m.content_scripts?.length) throw new Error('missing content_scripts');
            console.log('manifest OK: ' + m.name + ' v' + m.version);
          "
